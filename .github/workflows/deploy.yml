name: Build, Test Infrastructure & Deploy to Kubernetes Kind

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

env:
  BACKEND_REPO: netflixclone-backend
  FRONTEND_REPO: netflixclone-frontend
  IMAGE_TAG: ${{ github.sha }}
  AWS_REGION: us-east-1

jobs:
  kubernetes-deploy:
    name: Local K8s Cluster Build & Deploy
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # Step 1: Configure AWS Credentials
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      # Step 2: Spin up a local Kubernetes cluster inside the GitHub Runner
      - name: Create Kubernetes Kind Cluster
        uses: helm/kind-action@v1.10.0
        with:
          cluster_name: kind
          config: kind-config.yaml
          version: v0.23.0

      # Step 3: Install NGINX Ingress Controller
      - name: Install Ingress Controller
        run: |
          kubectl apply -f https://raw.githubusercontent.com/kubernetes/ingress-nginx/main/deploy/static/provider/kind/deploy.yaml
          kubectl wait --namespace ingress-nginx \
            --for=condition=ready pod \
            --selector=app.kubernetes.io/component=controller \
            --timeout=120s

      # Step 4: Verify cluster health
      - name: Verify Cluster Health
        run: |
          kubectl cluster-info
          kubectl get nodes
          kubectl get pods -A

      # Step 5: Setup Terraform CLI
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.9.0

      # Step 6: Terraform Init, Validate, and Apply (creates AWS resources: S3, IAM, ECR)
      - name: Terraform Init
        working-directory: ./terraform
        run: terraform init

      - name: Terraform Validate
        working-directory: ./terraform
        run: terraform validate

      - name: Terraform Apply
        working-directory: ./terraform
        run: |
          terraform apply -auto-approve \
            -var="mongo_uri=${{ secrets.MONGO_URI }}" \
            -var="backend_image=${{ env.BACKEND_REPO }}:${{ env.IMAGE_TAG }}" \
            -var="frontend_image=${{ env.FRONTEND_REPO }}:${{ env.IMAGE_TAG }}"

      # Step 7: Login to Amazon ECR
      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      # Step 8: Build, tag and push backend image to ECR
      - name: Build, Tag and Push Backend Image to ECR
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        run: |
          docker build -t ${{ env.BACKEND_REPO }}:latest -t ${{ env.BACKEND_REPO }}:${{ env.IMAGE_TAG }} ./backend
          docker tag ${{ env.BACKEND_REPO }}:${{ env.IMAGE_TAG }} ${{ env.ECR_REGISTRY }}/${{ env.BACKEND_REPO }}:${{ env.IMAGE_TAG }}
          docker tag ${{ env.BACKEND_REPO }}:latest ${{ env.ECR_REGISTRY }}/${{ env.BACKEND_REPO }}:latest
          docker push ${{ env.ECR_REGISTRY }}/${{ env.BACKEND_REPO }}:${{ env.IMAGE_TAG }}
          docker push ${{ env.ECR_REGISTRY }}/${{ env.BACKEND_REPO }}:latest

      # Step 9: Build, tag and push frontend image to ECR
      - name: Build, Tag and Push Frontend Image to ECR
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        run: |
          docker build -t ${{ env.FRONTEND_REPO }}:latest -t ${{ env.FRONTEND_REPO }}:${{ env.IMAGE_TAG }} ./frontend
          docker tag ${{ env.FRONTEND_REPO }}:${{ env.IMAGE_TAG }} ${{ env.ECR_REGISTRY }}/${{ env.FRONTEND_REPO }}:${{ env.IMAGE_TAG }}
          docker tag ${{ env.FRONTEND_REPO }}:latest ${{ env.ECR_REGISTRY }}/${{ env.FRONTEND_REPO }}:latest
          docker push ${{ env.ECR_REGISTRY }}/${{ env.FRONTEND_REPO }}:${{ env.IMAGE_TAG }}
          docker push ${{ env.ECR_REGISTRY }}/${{ env.FRONTEND_REPO }}:latest

      # Step 10: Load images into Kind cluster
      - name: Load Images into Kind Cluster
        run: |
          kind load docker-image ${{ env.BACKEND_REPO }}:latest
          kind load docker-image ${{ env.BACKEND_REPO }}:${{ env.IMAGE_TAG }}
          kind load docker-image ${{ env.FRONTEND_REPO }}:latest
          kind load docker-image ${{ env.FRONTEND_REPO }}:${{ env.IMAGE_TAG }}

      # Step 11: Create namespace and deploy Kubernetes manifests
      - name: Deploy Kubernetes Manifests
        run: |
          kubectl apply -f k8s/namespace.yaml
          kubectl apply -f k8s/backend-configmap.yaml
          kubectl apply -f k8s/backend-deployment.yaml
          kubectl apply -f k8s/backend-hpa.yaml
          kubectl apply -f k8s/frontend-deployment.yaml
          kubectl apply -f k8s/frontend-hpa.yaml
          kubectl apply -f k8s/frontend-nginx-configmap.yaml
          kubectl apply -f k8s/ingress.yaml

      # Step 12: Verify rollout stability
      - name: Wait for Deployments to Stabilize
        run: |
          echo "Waiting for backend app rollout..."
          kubectl rollout status deployment/backend -n netflixclone --timeout=90s || true
          echo "Waiting for frontend app rollout..."
          kubectl rollout status deployment/frontend -n netflixclone --timeout=90s || true

          echo "=========================================="
          echo "Current Running Pods in Kind Cluster:"
          kubectl get pods -n netflixclone -o wide
          echo "=========================================="
          echo "All Services:"
          kubectl get svc -n netflixclone
          echo "=========================================="
          echo "Ingress:"
          kubectl get ingress -n netflixclone
          echo "=========================================="
name: Build, Test Infrastructure & Deploy to Kubernetes Kind

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

env:
  BACKEND_REPO: netflixclone-backend
  FRONTEND_REPO: netflixclone-frontend
  IMAGE_TAG: ${{ github.sha }}

jobs:
  kubernetes-deploy:
    name: Local K8s Cluster Build & Deploy
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # Step 1: Spin up a local Kubernetes cluster inside the GitHub Runner
      - name: Create Kubernetes Kind Cluster
        uses: helm/kind-action@v1.10.0
        with:
          cluster_name: kind
          config: kind-config.yaml
          version: v0.23.0

      # Step 2: Install NGINX Ingress Controller
      - name: Install Ingress Controller
        run: |
          kubectl apply -f https://raw.githubusercontent.com/kubernetes/ingress-nginx/main/deploy/static/provider/kind/deploy.yaml
          kubectl wait --namespace ingress-nginx \
            --for=condition=ready pod \
            --selector=app.kubernetes.io/component=controller \
            --timeout=120s

      # Step 3: Test that the local cluster is online and reachable
      - name: Verify Cluster Health
        run: |
          kubectl cluster-info
          kubectl get nodes
          kubectl get pods -A

      # Step 4: Build Docker images locally inside the runner
      - name: Build Application Images Locally
        run: |
          docker build -t ${{ env.BACKEND_REPO }}:latest -t ${{ env.BACKEND_REPO }}:${{ env.IMAGE_TAG }} ./backend
          docker build -t ${{ env.FRONTEND_REPO }}:latest -t ${{ env.FRONTEND_REPO }}:${{ env.IMAGE_TAG }} ./frontend

      # Step 5: Sideload images directly into the Kind cluster nodes
      - name: Load Images into Kind Cluster
        run: |
          kind load docker-image ${{ env.BACKEND_REPO }}:latest
          kind load docker-image ${{ env.BACKEND_REPO }}:${{ env.IMAGE_TAG }}
          kind load docker-image ${{ env.FRONTEND_REPO }}:latest
          kind load docker-image ${{ env.FRONTEND_REPO }}:${{ env.IMAGE_TAG }}

      # Step 6: Setup Terraform CLI
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.9.0

      # Step 7: Deploy resources via Terraform
      - name: Terraform Init
        working-directory: ./terraform
        run: terraform init

      - name: Terraform Validate
        working-directory: ./terraform
        run: terraform validate


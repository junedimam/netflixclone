name: Build, Push to ECR & Deploy with Terraform

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

env:
  AWS_REGION: us-east-1
  ECR_REGISTRY: 158670532325.dkr.ecr.us-east-1.amazonaws.com
  BACKEND_REPO: netflixclone-backend
  FRONTEND_REPO: netflixclone-frontend
  TF_STATE_BUCKET: netflixclone-terraform-state

jobs:
  terraform:
    name: Deploy Infrastructure with Terraform
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'

    defaults:
      run:
        working-directory: ./terraform

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.9.0

      - name: Create Terraform state bucket (if not exists)
        run: |
          aws s3api head-bucket --bucket ${{ env.TF_STATE_BUCKET }} 2>/dev/null || \
          aws s3api create-bucket --bucket ${{ env.TF_STATE_BUCKET }} --region ${{ env.AWS_REGION }}

      - name: Terraform Init
        run: terraform init
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}

      - name: Terraform Validate
        run: terraform validate

      - name: Terraform Plan
        id: plan
        run: terraform plan -var="mongo_uri=${{ secrets.MONGO_URI }}" -out=tfplan
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}

      - name: Terraform Apply
        run: terraform apply -auto-approve tfplan
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}

  build-and-push:
    name: Build & Push Docker Images
    runs-on: ubuntu-latest
    needs: terraform
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build, tag, and push backend image to ECR
        id: build-backend
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build -t $ECR_REGISTRY/${{ env.BACKEND_REPO }}:latest \
                       -t $ECR_REGISTRY/${{ env.BACKEND_REPO }}:$IMAGE_TAG \
                       ./backend
          docker push $ECR_REGISTRY/${{ env.BACKEND_REPO }} --all-tags

      - name: Build, tag, and push frontend image to ECR
        id: build-frontend
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build -t $ECR_REGISTRY/${{ env.FRONTEND_REPO }}:latest \
                       -t $ECR_REGISTRY/${{ env.FRONTEND_REPO }}:$IMAGE_TAG \
                       ./frontend
          docker push $ECR_REGISTRY/${{ env.FRONTEND_REPO }} --all-tags

  deploy:
    name: Deploy to ECS Fargate
    runs-on: ubuntu-latest
    needs: build-and-push
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.9.0

      - name: Terraform Init
        run: terraform init
        working-directory: ./terraform
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}

      - name: Force new ECS deployments
        run: |
          echo "Forcing new deployment for backend..."
          aws ecs update-service --cluster netflixclone-cluster \
            --service netflixclone-backend-service \
            --force-new-deployment --region ${{ env.AWS_REGION }} > /dev/null 2>&1 || echo "Backend service not found (may be first deploy)"

          echo "Forcing new deployment for frontend..."
          aws ecs update-service --cluster netflixclone-cluster \
            --service netflixclone-frontend-service \
            --force-new-deployment --region ${{ env.AWS_REGION }} > /dev/null 2>&1 || echo "Frontend service not found (may be first deploy)"

      - name: Wait for ECS services to stabilize
        run: |
          echo "Waiting for backend service to stabilize..."
          aws ecs wait services-stable --cluster netflixclone-cluster \
            --services netflixclone-backend-service --region ${{ env.AWS_REGION }} || true

          echo "Waiting for frontend service to stabilize..."
          aws ecs wait services-stable --cluster netflixclone-cluster \
            --services netflixclone-frontend-service --region ${{ env.AWS_REGION }} || true

      - name: Get deployment info
        run: |
          echo "=========================================="
          echo "Deployment Complete!"
          echo "=========================================="
          echo "Alb DNS: $(terraform output -raw alb_dns_name)"
          echo "Backend ECR: $(terraform output -raw backend_repository_url)"
          echo "Frontend ECR: $(terraform output -raw frontend_repository_url)"
          echo "=========================================="
        working-directory: ./terraform
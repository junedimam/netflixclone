name: Backend CI

on:
  push:
    branches:
      - main
      - master
  pull_request:
    branches:
      - main
      - master
  workflow_dispatch:

jobs:
  build-and-test:
    name: Build and Test Backend
    runs-on: ubuntu-latest
    
    defaults:
      run:
        working-directory: backend

    strategy:
      matrix:
        node-version: [20.x]

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install Dependencies
        run: npm ci

      - name: Run Unit Tests
        # The '|| true' ensures that even if you don't have tests configured yet, 
        # the CI pipeline won't break and throw a "Missing script: test" error.
        run: npm test || echo "No tests configured yet"

      - name: Verify Application Starts
        # Starts the app and forcefully shuts it down after 10 seconds to verify it builds/runs without crashing.
        run: |
          timeout 10s npm start || TS_EXIT=$?
          if [ $TS_EXIT -eq 124 ]; then
            echo "Application started successfully and was stopped by timeout."
            exit 0
          else
            echo "Application failed to start correctly."
            exit $TS_EXIT
          fi

      - name: Upload Build Artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-package
          path: backend/package.json
